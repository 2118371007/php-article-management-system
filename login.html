<!DOCTYPE html>
<html lang="en">
    <script src="js/jquery.min.js"></script>
    <script src="js/js.js"></script>
    <script src="/js/login.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="css/css.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('/images/登录背景.png') no-repeat center center fixed;
            background-size: cover;
        }

        .login-container {
            width: 600px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h1 {
            margin-bottom: 40px;
            font-size: 36px;
            color: #333;
            animation: slideIn 1.2s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
            animation: scaleUp 1.4s ease-in-out;
        }

        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            color: #666;
        }

        .form-group input,#username{
            width: 100%;
            padding: 12px 45px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus,#username:focus{
            border-color: #007BFF;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }

        .form-group .icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            font-size: 20px;
            color: #888;
        }

        .error-message {
            display: none;
            font-size: 14px;
            color: #d9534f;
            margin-top: 5px;
            padding: 5px 10px;
            border: 1px solid #d9534f;
            border-radius: 5px;
            background-color: #f8d7da;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            50% {
                transform: translateX(5px);
            }
            75% {
                transform: translateX(-5px);
            }
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            color: #fff;
            background: #007BFF;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .login-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .register-link {
            display: block;
            margin-top: 20px;
            font-size: 18px;
            color: #007BFF;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .register-link:hover {
            color: #0056b3;
        }
        /* 七天免密登录 */
        .remember-me {
            margin-top: 15px;
            text-align: left;
            font-size: 16px;
            color: #666;
            display: flex;
            align-items: center;
        }
        .remember-me input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>登录</h1>
        <div class="form-group">
            <label for="username">用户名</label>
            <i class="icon">👤</i> <!-- 用户名图标 -->
            <input type="text" id="username" placeholder="请输入用户名">
            <div id="username-error" class="error-message">用户名不能为空！</div>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <i class="icon">🔒</i> <!-- 密码图标 -->
            <input type="password" id="password" placeholder="请输入密码">
            <div id="password-error" class="error-message">密码不能为空！</div>
        </div>
        <!-- 新增的七天免密登录选项 -->
        <div class="remember-me">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">七天免密登录</label>
        </div>
        <button id="btn" class="login-btn">登录</button>
        <a href="#" class="register-link"   id="register">注册</a>
    </div>
    <!-- 弹出框 -->
	<div id="custom-popup" class="popup">
		<div class="popup-content">
			<p id="popup-message">这是提示信息</p>
			<button id="popup-close">确定</button>
		</div>
	</div>

</body>
</html>
