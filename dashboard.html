<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><title>控制面板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
</head>
<body>
    <div class="container-fluid pt-3" id="dashboard-content"></div>
    <div class="modal fade" id="userDetailsModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">用户文章统计</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
        <div class="modal-body"><div class="table-responsive"><table class="table table-bordered">
            <thead><tr><th>用户名</th><th>手机文</th><th>笔记本文</th><th>耳机文</th><th>总文章</th><th>角色</th></tr></thead>
            <tbody id="user-details-table"></tbody>
        </table></div></div>
    </div></div></div>
    <script src="js/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
