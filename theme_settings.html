<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><title>个性化与主题</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid pt-3">
        <div class="card">
            <div class="card-header"><h3 class="card-title">个性化与主题</h3></div>
            <div class="card-body">
                <div class="form-group"><label>主题模式</label><select id="theme-mode" class="form-control"><option value="">亮色 (默认)</option><option value="dark-mode">暗色</option></select></div>
                <div class="form-group"><label>顶部导航栏</label><select id="theme-color" class="form-control"><option value="navbar-white">白</option><option value="navbar-primary">蓝</option><option value="navbar-danger">红</option><option value="navbar-success">绿</option><option value="navbar-warning">黄</option><option value="navbar-info">青</option></select></div>
                <div class="form-group"><label>侧边栏</label><select id="sidebar-color" class="form-control"><option value="sidebar-dark-primary">深蓝</option><option value="sidebar-dark-success">深绿</option><option value="sidebar-dark-danger">深红</option><option value="sidebar-light-primary">浅蓝</option></select></div>
                <button class="btn btn-primary" id="save-theme-settings">保存并应用</button>
            </div>
        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script src="js/theme_settings.js"></script>
</body>
</html>
